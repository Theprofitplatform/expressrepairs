name: R2 token check

# One-off diagnostic for the R2_API_TOKEN secret. Prints Cloudflare's verdict
# on the token (valid? what does it reject?) without ever printing the token.
# Delete this file once the mirror step works.

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Verify token with Cloudflare
        env:
          T: ${{ secrets.R2_API_TOKEN }}
          ACC: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "token length: ${#T}"
          echo "account id length: ${#ACC}"
          echo "--- /user/tokens/verify ---"
          curl -s https://api.cloudflare.com/client/v4/user/tokens/verify \
            -H "Authorization: Bearer $T" | head -c 400; echo
          echo "--- bucket list (expressrepairs-products) ---"
          curl -s "https://api.cloudflare.com/client/v4/accounts/$ACC/r2/buckets/expressrepairs-products/objects?per_page=1" \
            -H "Authorization: Bearer $T" | head -c 400; echo

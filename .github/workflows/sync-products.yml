name: Sync products from DXPOS

# Pulls the accessories catalog from the POS (shop PC via the pos tunnel) and
# commits src/data/products.json + images. deploy.yml picks up the push and
# ships it. Runs during shop hours because the shop PC hosts DXPOS; an offline
# PC makes the sync a no-op (script exits 0), never a broken shop.
#
# Repo secrets required: POS_GATE_USER POS_GATE_PASS POS_EMAIL POS_PASSWORD

on:
  schedule:
    - cron: '30 23 * * 0-5'  # ~9:30am Sydney, Mon–Sat
    - cron: '0 4 * * 1-6'    # ~2–3pm Sydney, Mon–Sat
  workflow_dispatch:

permissions:
  contents: write
  actions: write # to dispatch the deploy workflow after committing new data

concurrency:
  group: sync-products
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Sync catalog
        run: npm run sync:products
        env:
          POS_GATE_USER: ${{ secrets.POS_GATE_USER }}
          POS_GATE_PASS: ${{ secrets.POS_GATE_PASS }}
          POS_EMAIL: ${{ secrets.POS_EMAIL }}
          POS_PASSWORD: ${{ secrets.POS_PASSWORD }}

      # Mirror any not-yet-hosted supplier images into R2 and refresh the
      # r2-images.json manifest, so new DXPOS products become self-hosted on
      # the next sync (this run they fall back to the supplier URL). Skips
      # cleanly until the owner adds an R2-scoped token as the R2_API_TOKEN
      # repo secret (Cloudflare dashboard → R2 → Manage API Tokens).
      - name: Mirror new images to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.R2_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "R2_API_TOKEN secret not set — skipping image mirror (supplier URLs still work)."
          else
            node scripts/upload-images-r2.mjs
            # Regenerate the HOCO import so newly mirrored H- ids switch from
            # hoco.com.au URLs to the R2 copies in the committed data.
            node scripts/import-hoco.mjs
          fi

      - name: Validate synced data
        run: npx vitest run tests/products.test.js

      - name: Commit if changed
        id: commit
        run: |
          git add src/data/products.json src/data/r2-images.json src/data/hoco-products.json
          if git diff --cached --quiet; then
            echo "No product changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "product-sync[bot]"
            git config user.email "sales@funcovers.com.au"
            git commit -m "chore(shop): sync products from DXPOS"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # A push made with GITHUB_TOKEN does NOT trigger other workflows (GitHub
      # blocks that to avoid loops), so the synced data would sit in the repo
      # and never reach the live site. Dispatch the deploy explicitly.
      - name: Deploy the new catalogue
        if: steps.commit.outputs.changed == 'true'
        run: gh workflow run "Deploy to Cloudflare Pages" --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

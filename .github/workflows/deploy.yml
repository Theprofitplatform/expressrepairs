name: Deploy to Cloudflare Pages

# Builds the Astro site and publishes it to the Cloudflare Pages project
# "expressrepairs", which serves the live domain expressrepairs.com.au (+ www).
# The custom domain is attached to this Pages project, so this is the deploy
# that actually updates production. Production branch is "main"; every push to
# main publishes to the live domain. Uses the pinned wrangler from devDependencies.
#
# Requires two repo secrets:
#   CLOUDFLARE_API_TOKEN  - custom token with "Account · Cloudflare Pages · Edit"
#   CLOUDFLARE_ACCOUNT_ID - 8fc18f5691f32fccc13eb17e85a0ae10

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name expressrepairs --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

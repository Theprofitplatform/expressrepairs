# Cloudflare Worker (static assets) for expressrepairs.com.au.
# Worker "expressrepairs" serves the Astro build (dist/) as static assets.
# Production branch is "main"; Cloudflare Workers Builds builds + deploys on push.
name = "expressrepairs"
compatibility_date = "2026-06-09"

[assets]
directory = "./dist"
not_found_handling = "404-page"
